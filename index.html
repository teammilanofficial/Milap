<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f3460">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Milap - Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f3460;
    --navy-dark: #0a2540;
    --navy-light: #e6eff8;
    --white: #ffffff;
    --bg: #f0f4f8;
    --text: #1a1a2e;
    --text-secondary: #5a6b7c;
    --border: #dbe4ea;
    --radius: 20px;
    --radius-sm: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); }
  #app { height: 100%; }
  .hidden { display: none !important; }

  /* Login */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(180deg, #f0f4f8 0%, #e2e8f0 100%); }
  .login-card { background: var(--white); width: 100%; max-width: 440px; border-radius: var(--radius); padding: 40px 28px; box-shadow: 0 12px 40px rgba(15,52,96,0.12); }
  .logo-wrap { text-align: center; margin-bottom: 32px; }
  .logo-circle { width: 84px; height: 84px; background: var(--navy); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 40px; font-weight: 700; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(15,52,96,0.25); }
  .logo-wrap h1 { margin: 0; font-size: 32px; font-weight: 700; color: var(--navy); letter-spacing: -0.5px; }
  .logo-wrap p { margin: 10px 0 0; color: var(--text-secondary); font-size: 15px; line-height: 1.5; }

  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .field input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; font-family: inherit; background: var(--white); color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s; }
  .field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(15,52,96,0.08); }
  .room-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chip { padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--white); color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; user-select: none; transition: all .2s; }
  .chip:hover { border-color: var(--navy); color: var(--navy); }
  .chip.active { background: var(--navy); color: white; border-color: var(--navy); }

  .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius-sm); background: var(--navy); color: white; font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity .2s, transform .1s; letter-spacing: 0.3px; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .status { margin-top: 14px; text-align: center; font-size: 14px; min-height: 20px; }
  .status.error { color: #c0392b; }
  .status.info { color: var(--text-secondary); }
  .status.success { color: #27ae60; }

  /* Chat */
  #chat-screen { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  header { height: 64px; background: var(--navy); color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
  .header-left, .header-right { display: flex; align-items: center; gap: 12px; }
  .header-title { font-weight: 700; font-size: 17px; letter-spacing: 0.3px; }
  .header-sub { font-size: 12px; opacity: 0.85; font-weight: 400; }
  .icon-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.12); color: white; border: none; cursor: pointer; font-size: 18px; }
  .icon-btn:active { background: rgba(255,255,255,0.25); }

  .main-wrap { display: flex; flex: 1; overflow: hidden; position: relative; }
  #sidebar { width: 280px; background: #f8fafc; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px; flex-shrink: 0; }
  #sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-secondary); margin: 0 0 10px; font-weight: 600; }
  .room-list { margin-bottom: 24px; }
  .room-item { padding: 10px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background .15s; color: var(--text); }
  .room-item:hover { background: var(--navy-light); }
  .room-item.active { background: var(--navy); color: white; }
  .user-list { flex: 1; overflow-y: auto; }
  .user-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; color: var(--text); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--navy); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; flex-shrink: 0; box-shadow: 0 0 0 2px #f8fafc; }
  .sidebar-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border); }
  .leave-btn { width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; background: white; color: var(--text); font-weight: 600; font-size: 14px; cursor: pointer; transition: all .2s; }
  .leave-btn:active { border-color: var(--navy); color: var(--navy); }

  #chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--white); }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
  .empty-state { text-align: center; color: var(--text-secondary); margin-top: 40px; font-size: 15px; }
  .message { max-width: 82%; margin-bottom: 16px; animation: popIn 0.25s ease; }
  .message.own { align-self: flex-end; }
  .message.other { align-self: flex-start; }
  .message-bubble { padding: 12px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
  .message.own .message-bubble { background: var(--navy-light); color: var(--navy-dark); border-bottom-right-radius: 4px; }
  .message.other .message-bubble { background: var(--white); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
  .message-author { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .message-time { font-size: 11px; color: var(--text-secondary); margin-top: 6px; text-align: right; font-weight: 500; }
  .system-line { text-align: center; margin: 16px 0; font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 12px; font-weight: 500; }
  .system-line::before, .system-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .date-separator { text-align: center; margin: 22px 0; font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 10px; }
  .date-separator::before, .date-separator::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  #typing-bar { padding: 6px 20px; font-size: 13px; color: var(--text-secondary); font-style: italic; min-height: 26px; font-weight: 500; }

  #input-area { border-top: 1px solid var(--border); padding: 12px 16px; background: var(--white); display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  #msg-input { flex: 1; padding: 12px 18px; border: 1.5px solid var(--border); border-radius: 24px; font-size: 16px; font-family: inherit; outline: none; background: #f8fafc; transition: all .2s; }
  #msg-input:focus { border-color: var(--navy); background: var(--white); }
  #send-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--navy); color: white; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform .1s, opacity .2s; }
  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.5; }
  #send-btn svg { width: 20px; height: 20px; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 15; backdrop-filter: blur(2px); }
  .overlay.show { display: block; }

  @media (max-width: 768px) {
    #sidebar { position: fixed; left: -290px; top: 0; bottom: 0; z-index: 20; width: 280px; transition: left .3s ease; box-shadow: 4px 0 24px rgba(0,0,0,0.12); }
    #sidebar.open { left: 0; }
    .login-card { padding: 32px 22px; }
    .logo-circle { width: 72px; height: 72px; font-size: 34px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="login-screen">
    <div class="login-card">
      <div class="logo-wrap">
        <div class="logo-circle">M</div>
        <h1>Milap</h1>
        <p>Simple conversations. Lasting connections.</p>
      </div>

      <div class="field">
        <label for="username">Your Name</label>
        <input type="text" id="username" placeholder="Enter your name" maxlength="30" autocomplete="off" autocapitalize="words">
      </div>

      <div class="field">
        <label for="room">Room Name</label>
        <input type="text" id="room" placeholder="Enter or pick a room" maxlength="30" autocomplete="off">
        <div class="room-chips">
          <div class="chip" data-room="General">General</div>
          <div class="chip" data-room="Family">Family</div>
          <div class="chip" data-room="Friends">Friends</div>
          <div class="chip" data-room="Work">Work</div>
          <div class="chip" data-room="Study">Study</div>
        </div>
      </div>

      <button class="btn" id="join-btn">Join Chat</button>
      <div class="status" id="login-status"></div>
    </div>
  </div>

  <div id="chat-screen" class="hidden">
    <header>
      <div class="header-left">
        <button class="icon-btn" id="menu-btn">☰</button>
        <div>
          <div class="header-title">Milap</div>
          <div class="header-sub" id="room-display">Room: General</div>
        </div>
      </div>
      <div class="header-right">
        <div class="header-sub" id="online-count">0 online</div>
      </div>
    </header>

    <div class="overlay" id="overlay"></div>
    <div class="main-wrap">
      <aside id="sidebar">
        <div class="room-list">
          <h3>Rooms</h3>
          <div id="rooms-list"></div>
        </div>
        <div class="user-list">
          <h3>Online</h3>
          <div id="users-list"></div>
        </div>
        <div class="sidebar-footer">
          <button class="leave-btn" id="leave-btn">Leave Room</button>
        </div>
      </aside>

      <div id="chat-main">
        <div id="messages">
          <div class="empty-state" id="empty-state">Welcome! Messages will appear here.</div>
        </div>
        <div id="typing-bar"></div>
        <div id="input-area">
          <input type="text" id="msg-input" placeholder="Type a message..." maxlength="1000" autocomplete="off">
          <button id="send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
/* ================= CONFIG ================= */
// ⚠️ IMPORTANT: Replace this with your Render backend URL after deploying (see README)
const SERVER_URL = 'https://milap-server.onrender.com';
/* ========================================== */

const $ = id => document.getElementById(id);
const loginScreen = $('login-screen');
const chatScreen = $('chat-screen');
const usernameInput = $('username');
const roomInput = $('room');
const joinBtn = $('join-btn');
const loginStatus = $('login-status');
const roomDisplay = $('room-display');
const onlineCount = $('online-count');
const messagesEl = $('messages');
const msgInput = $('msg-input');
const sendBtn = $('send-btn');
const typingBar = $('typing-bar');
const usersList = $('users-list');
const roomsList = $('rooms-list');
const menuBtn = $('menu-btn');
const sidebar = $('sidebar');
const overlay = $('overlay');
const leaveBtn = $('leave-btn');

let socket = null;
let myUsername = '';
let myRoom = '';
let typingTimer = null;
let typingUsers = [];
const ALL_ROOMS = ['General','Family','Friends','Work','Study'];

/* ---------- Helpers ---------- */
function showStatus(text, type) {
  loginStatus.textContent = text;
  loginStatus.className = 'status ' + (type || '');
}
function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

/* ---------- Room chips ---------- */
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    roomInput.value = chip.dataset.room;
  });
});

/* ---------- Build sidebar rooms ---------- */
function buildRoomsList(active) {
  roomsList.innerHTML = '';
  ALL_ROOMS.forEach(r => {
    const div = document.createElement('div');
    div.className = 'room-item ' + (r === active ? 'active' : '');
    div.textContent = r;
    div.addEventListener('click', () => {
      if (r !== myRoom && socket) {
        socket.disconnect();
        roomInput.value = r;
        messagesEl.innerHTML = '<div class="empty-state" id="empty-state">Welcome! Messages will appear here.</div>';
        closeSidebar();
        joinChat();
      }
    });
    roomsList.appendChild(div);
  });
}

/* ---------- Messages ---------- */
function removeEmpty() {
  const empty = $('empty-state');
  if (empty) empty.remove();
}
function appendMessage(msg, animate) {
  removeEmpty();
  const isMe = msg.username === myUsername;
  const div = document.createElement('div');
  div.className = 'message ' + (isMe ? 'own' : 'other');
  if (animate) div.style.animation = 'popIn 0.25s ease';
  const time = msg.timestamp ? formatTime(msg.timestamp) : '';
  div.innerHTML = `
    <div class="message-bubble">
      ${!isMe ? `<div class="message-author">${escapeHtml(msg.username)}</div>` : ''}
      <div>${escapeHtml(msg.text)}</div>
      ${time ? `<div class="message-time">${time}</div>` : ''}
    </div>`;
  messagesEl.appendChild(div);
}
function appendSystem(text) {
  removeEmpty();
  const div = document.createElement('div');
  div.className = 'system-line';
  div.textContent = text;
  messagesEl.appendChild(div);
}
function updateUsers(users) {
  const list = users || [];
  onlineCount.textContent = list.length + ' online';
  usersList.innerHTML = '';
  list.forEach(u => {
    const item = document.createElement('div');
    item.className = 'user-item';
    item.innerHTML = `<div class="avatar">${u.charAt(0).toUpperCase()}</div><div style="flex:1">${escapeHtml(u)}</div><div class="online-dot"></div>`;
    usersList.appendChild(item);
  });
}
function updateTyping() {
  const names = typingUsers.filter(u => u !== myUsername);
  if (names.length === 0) typingBar.textContent = '';
  else if (names.length === 1) typingBar.textContent = names[0] + ' is typing...';
  else typingBar.textContent = names.length + ' people are typing...';
}

/* ---------- Join / Socket ---------- */
function joinChat() {
  const username = usernameInput.value.trim();
  const room = roomInput.value.trim() || 'General';

  if (!username) { showStatus('Please enter your name', 'error'); return; }
  if (username.length < 2) { showStatus('Name is too short', 'error'); return; }
  if (SERVER_URL.includes('your-render-app-name')) { showStatus('Update SERVER_URL in the code first!', 'error'); return; }

  myUsername = username;
  myRoom = room;
  showStatus('Connecting...', 'info');
  joinBtn.disabled = true;

  try {
    socket = io(SERVER_URL, { transports: ['websocket', 'polling'], timeout: 10000 });
  } catch (e) {
    showStatus('Cannot connect. Check your server URL.', 'error');
    joinBtn.disabled = false;
    return;
  }

  socket.on('connect', () => {
    socket.emit('join', { username, room });
  });

  socket.on('connect_error', () => {
    showStatus('Connection failed. Check URL or wait 30s for Render to wake up.', 'error');
    joinBtn.disabled = false;
  });

  socket.on('history', (msgs) => {
    removeEmpty();
    msgs.forEach(m => appendMessage(m, false));
    scrollToBottom();
  });

  socket.on('message', (msg) => {
    appendMessage(msg, true);
    scrollToBottom();
  });

  socket.on('notification', (n) => {
    appendSystem(n.text);
    if (n.users) updateUsers(n.users);
    scrollToBottom();
  });

  socket.on('users', (users) => updateUsers(users));

  socket.on('typing', ({ username, isTyping }) => {
    if (isTyping) { if (!typingUsers.includes(username)) typingUsers.push(username); }
    else { typingUsers = typingUsers.filter(u => u !== username); }
    updateTyping();
  });

  socket.on('disconnect', () => {
    appendSystem('You were disconnected. Reconnecting...');
  });

  // Show chat
  loginScreen.classList.add('hidden');
  chatScreen.classList.remove('hidden');
  roomDisplay.textContent = 'Room: ' + room;
  buildRoomsList(room);
  msgInput.focus();
}

/* ---------- Send ---------- */
function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !socket) return;
  socket.emit('message', { text, room: myRoom });
  msgInput.value = '';
  socket.emit('typing', { room: myRoom, isTyping: false });
  clearTimeout(typingTimer);
  msgInput.focus();
}

/* ---------- Events ---------- */
joinBtn.addEventListener('click', joinChat);
usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') roomInput.focus(); });
roomInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
  else {
    if (socket) {
      socket.emit('typing', { room: myRoom, isTyping: true });
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        socket.emit('typing', { room: myRoom, isTyping: false });
      }, 1800);
    }
  }
});

menuBtn.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', closeSidebar);

leaveBtn.addEventListener('click', () => {
  if (socket) socket.disconnect();
  chatScreen.classList.add('hidden');
  loginScreen.classList.remove('hidden');
  messagesEl.innerHTML = '<div class="empty-state" id="empty-state">Welcome! Messages will appear here.</div>';
  typingBar.textContent = '';
  typingUsers = [];
  joinBtn.disabled = false;
  showStatus('', '');
});

// Pre-select General
const generalChip = document.querySelector('.chip[data-room="General"]');
if (generalChip) { generalChip.classList.add('active'); roomInput.value = 'General'; }
</script>
</body>
</html>
