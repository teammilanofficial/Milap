<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f3460">
<title>Milap</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;background:#f0f4f8;color:#1a1a2e;height:100vh}
#app{height:100%}
.hidden{display:none!important}
.screen{height:100vh;display:flex;flex-direction:column}
#auth-screen{align-items:center;justify-content:center;padding:20px;background:#f0f4f8}
.card{background:#fff;width:100%;max-width:420px;border-radius:20px;padding:28px 22px;box-shadow:0 12px 40px rgba(15,52,96,0.12)}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{width:72px;height:72px;background:#0f3460;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:700;margin-bottom:12px}
.logo h1{font-size:28px;color:#0f3460}
.logo p{font-size:14px;color:#5a6b7c;margin-top:6px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:10px;border:0;border-radius:12px;background:#e6eff8;color:#0f3460;font-weight:600;font-size:15px;cursor:pointer}
.tab.active{background:#0f3460;color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:#1a1a2e}
.field input{width:100%;padding:13px 14px;border:1.5px solid #dbe4ea;border-radius:14px;font-size:16px;outline:none}
.field input:focus{border-color:#0f3460}
.btn{width:100%;padding:15px;border:0;border-radius:14px;background:#0f3460;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.btn:active{opacity:0.9}
.status{margin-top:12px;text-align:center;font-size:14px;min-height:20px}
.status.error{color:#c0392b}
.status.info{color:#5a6b7c}
.status.ok{color:#27ae60}
.hint{font-size:13px;color:#5a6b7c;margin-top:10px;text-align:center;line-height:1.5}
header{height:60px;background:#0f3460;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0}
header h2{font-size:18px}
.icon-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;border:0;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
#main{flex:1;display:flex;overflow:hidden}
#sidebar{width:100%;max-width:300px;background:#f8fafc;border-right:1px solid #dbe4ea;display:flex;flex-direction:column}
#sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#5a6b7c;padding:16px 16px 8px;font-weight:600}
.contact-item{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid #f0f4f8}
.contact-item:hover{background:#e6eff8}
.contact-item.active{background:#0f3460;color:#fff}
.contact-item.active .c-meta{color:rgba(255,255,255,0.8)}
.c-avatar{width:42px;height:42px;border-radius:50%;background:#0f3460;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-meta{font-size:12px;color:#5a6b7c}
#chat-pane{flex:1;display:flex;flex-direction:column;background:#fff}
#messages{flex:1;overflow-y:auto;padding:16px}
.empty{text-align:center;color:#5a6b7c;margin-top:40px;font-size:15px}
.message{max-width:80%;margin-bottom:14px;animation:pop .2s ease}
.message.own{align-self:flex-end}
.message.other{align-self:flex-start}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.4;word-wrap:break-word}
.message.own .bubble{background:#0f3460;color:#fff;border-bottom-right-radius:4px}
.message.other .bubble{background:#e6eff8;color:#1a1a2e;border-bottom-left-radius:4px}
.msg-time{font-size:11px;opacity:0.7;margin-top:4px;text-align:right}
#input-area{border-top:1px solid #dbe4ea;padding:10px 12px;display:flex;gap:8px;align-items:center;background:#fff}
#msg-input{flex:1;padding:12px 16px;border:1.5px solid #dbe4ea;border-radius:24px;font-size:16px;outline:none}
#send-btn{width:46px;height:46px;border-radius:50%;background:#0f3460;color:#fff;border:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
#add-contact{padding:12px 16px;border-bottom:1px solid #dbe4ea}
#add-contact input{flex:1;padding:10px 14px;border:1.5px solid #dbe4ea;border-radius:12px;font-size:15px}
.flex{display:flex;gap:8px}
#search-results{max-height:200px;overflow-y:auto}
.result-item{padding:10px 16px;border-bottom:1px solid #f0f4f8;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.result-item:active{background:#e6eff8}
.small-btn{padding:8px 14px;border:0;border-radius:10px;background:#0f3460;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.my-code-box{padding:14px 16px;border-top:1px solid #dbe4ea;background:#e6eff8}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){#sidebar{position:fixed;left:-320px;top:0;bottom:0;z-index:20;transition:left .25s}#sidebar.open{left:0}#menu-btn{display:flex}}
</style>
</head>
<body>
<div id="app">
  <div id="auth-screen" class="screen">
    <div class="card">
      <div class="logo"><div class="logo-icon">M</div><h1>Milap</h1><p>Private conversations. Trusted connections.</p></div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>
      <div id="login-form">
        <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="you@email.com"></div>
        <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••"></div>
        <button class="btn" onclick="doLogin()">Login</button>
      </div>
      <div id="reg-form" class="hidden">
        <div class="field"><label>Your Name</label><input type="text" id="r-name" placeholder="Full Name" maxlength="30"></div>
        <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="you@email.com"></div>
        <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="Min 6 characters"></div>
        <div class="field"><label>Invite Code</label><input type="text" id="r-code" placeholder="Enter invite code"></div>
        <button class="btn" onclick="doRegister()">Create Account</button>
      </div>
      <div class="status" id="auth-status"></div>
      <div class="hint" id="auth-hint">First time? Use invite code <b>MILAP-FIRST</b></div>
    </div>
  </div>

  <div id="chat-screen" class="screen hidden">
    <header>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="icon-btn" id="menu-btn" onclick="toggleMenu()">☰</button>
        <h2 id="chat-title">Milap</h2>
      </div>
      <button class="icon-btn" onclick="logout()">↪</button>
    </header>
    <div id="main">
      <aside id="sidebar">
        <div id="add-contact">
          <div class="flex"><input id="search-input" placeholder="Search by email or name..." onkeydown="if(event.key==='Enter')doSearch()"><button class="small-btn" onclick="doSearch()">Search</button></div>
          <div id="search-results"></div>
        </div>
        <h3>Contacts</h3>
        <div id="contacts-list"></div>
        <div class="my-code-box">
          <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:#5a6b7c;font-weight:600">My Invite Code</div>
          <div style="font-weight:700;color:#0f3460;font-size:18px;margin-top:4px;letter-spacing:0.5px" id="my-code">---</div>
          <div style="font-size:12px;color:#5a6b7c;margin-top:4px">Share this code so friends can join</div>
        </div>
      </aside>
      <div id="chat-pane">
        <div id="messages"><div class="empty">Select a contact to start chatting</div></div>
        <div id="input-area">
          <input type="text" id="msg-input" placeholder="Type a message..." maxlength="1000" onkeydown="if(event.key==='Enter')sendMsg()">
          <button id="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const SERVER_URL = 'https://your-render-app-name.onrender.com';
let token = localStorage.getItem('milap_token');
let me = null;
let socket = null;
let activeContact = null;
let contacts = [];

function $(id){return document.getElementById(id)}
function showAuth(msg,type){$('auth-status').textContent=msg;$('auth-status').className='status '+(type||'')}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', (t==='login'&&b.textContent==='Login')||(t==='register'&&b.textContent==='Register')));
  $('login-form').classList.toggle('hidden', t!=='login');
  $('reg-form').classList.toggle('hidden', t!=='register');
}

async function doRegister(){
  const name=$('r-name').value.trim(), email=$('r-email').value.trim().toLowerCase(), pass=$('r-pass').value, code=$('r-code').value.trim();
  if(!name||!email||!pass||!code)return showAuth('Fill all fields','error');
  if(pass.length<6)return showAuth('Password too short','error');
  showAuth('Creating...','info');
  try{
    const r=await fetch(SERVER_URL+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:name,email,password:pass,inviteCode:code})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Failed');
    saveSession(d.token,d.user);
    showAuth('Account created!','ok');
  }catch(e){showAuth(e.message,'error');}
}

async function doLogin(){
  const email=$('l-email').value.trim().toLowerCase(), pass=$('l-pass').value;
  if(!email||!pass)return showAuth('Enter email and password','error');
  showAuth('Logging in...','info');
  try{
    const r=await fetch(SERVER_URL+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Failed');
    saveSession(d.token,d.user);
  }catch(e){showAuth(e.message,'error');}
}

function saveSession(t,u){
  token=t; me=u; localStorage.setItem('milap_token',t); localStorage.setItem('milap_user',JSON.stringify(u));
  showAuth('','');
  loadChat();
}

async function loadChat(){
  $('auth-screen').classList.add('hidden');
  $('chat-screen').classList.remove('hidden');
  await loadContacts();
  connectSocket();
}

async function loadContacts(){
  const r=await fetch(SERVER_URL+'/me',{headers:{'Authorization':'Bearer '+token}});
  if(!r.ok){logout();return;}
  const d=await r.json();
  contacts=d.contacts||[];
  $('my-code').textContent = d.inviteCode || '---';
  renderContacts();
}

function renderContacts(){
  const el=$('contacts-list');
  el.innerHTML='';
  if(!contacts.length){el.innerHTML='<div class="empty" style="padding:16px">No contacts yet. Search above.</div>';return;}
  contacts.forEach(c=>{
    const div=document.createElement('div');
    div.className='contact-item'+(activeContact===c._id?' active':'');
    div.innerHTML='<div class="c-avatar">'+c.username.charAt(0).toUpperCase()+'</div><div class="c-info"><div class="c-name">'+esc(c.username)+'</div><div class="c-meta">'+esc(c.email)+'</div></div>';
    div.onclick=()=>openChat(c);
    el.appendChild(div);
  });
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

async function doSearch(){
  const q=$('search-input').value.trim();
  if(!q)return;
  const r=await fetch(SERVER_URL+'/search?q='+encodeURIComponent(q),{headers:{'Authorization':'Bearer '+token}});
  const d=await r.json();
  const res=$('search-results');
  res.innerHTML='';
  if(!d.length){
    res.innerHTML='<div class="empty" style="padding:10px">No user found. <button class="small-btn" onclick="inviteWA()">Invite via WhatsApp</button></div>';
    return;
  }
  d.forEach(u=>{
    const div=document.createElement('div');
    div.className='result-item';
    div.innerHTML='<div><div style="font-weight:600">'+esc(u.username)+'</div><div style="font-size:12px;color:#5a6b7c">'+esc(u.email)+'</div></div><button class="small-btn" onclick="addContact(\''+u._id+'\')">Add</button>';
    res.appendChild(div);
  });
}

function inviteWA(){
  const text='Hello! I am inviting you to chat with me on Milap app. Join here: '+window.location.href;
  window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

async function addContact(id){
  await fetch(SERVER_URL+'/add-contact',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({userId:id})});
  $('search-results').innerHTML='';
  $('search-input').value='';
  await loadContacts();
}

async function openChat(contact){
  activeContact=contact._id?contact._id:contact;
  renderContacts();
  $('chat-title').textContent=contact.username||'Chat';
  const r=await fetch(SERVER_URL+'/messages/'+activeContact,{headers:{'Authorization':'Bearer '+token}});
  const msgs=await r.json();
  const box=$('messages');
  box.innerHTML='';
  if(!msgs.length)box.innerHTML='<div class="empty">Start the conversation below</div>';
  msgs.forEach(m=>appendMsg(m));
  if(window.innerWidth<=768)toggleMenu();
}

function appendMsg(m){
  const box=$('messages');
  const empty=box.querySelector('.empty');
  if(empty)empty.remove();
  const isMe = (m.from._id===me._id || m.from===me._id);
  const div=document.createElement('div');
  div.className='message '+(isMe?'own':'other');
  const time=new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  div.innerHTML='<div class="bubble">'+esc(m.text)+'<div class="msg-time">'+time+'</div></div>';
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function sendMsg(){
  const text=$('msg-input').value.trim();
  if(!text||!activeContact||!socket)return;
  socket.emit('message',{to:activeContact,text});
  $('msg-input').value='';
}

function connectSocket(){
  if(socket)socket.disconnect();
  socket=io(SERVER_URL,{auth:{token},transports:['websocket','polling']});
  socket.on('message',m=>{
    if(m.from._id===activeContact || m.to===activeContact || m.from._id===me._id){appendMsg(m);}
  });
}

function toggleMenu(){
  $('sidebar').classList.toggle('open');
}

function logout(){
  if(socket)socket.disconnect();
  localStorage.clear();
  token=null;me=null;activeContact=null;contacts=[];
  $('chat-screen').classList.add('hidden');
  $('auth-screen').classList.remove('hidden');
  $('messages').innerHTML='<div class="empty">Select a contact to start chatting</div>';
  $('contacts-list').innerHTML='';
}

if(token){
  try{me=JSON.parse(localStorage.getItem('milap_user'));if(me)loadChat();}catch(e){localStorage.clear();}
}
</script>
</body>
</html>
